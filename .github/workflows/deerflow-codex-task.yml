name: DeerFlow Codex CLI Runner

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task ID"
        required: true
        type: string
      task_title:
        description: "Task title"
        required: true
        type: string
      acceptance:
        description: "Acceptance criteria"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  codex_task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show environment
        shell: bash
        run: |
          set -euxo pipefail
          node -v
          npm -v
          git --version
          pwd
          ls -la

      - name: Install Codex CLI
        shell: bash
        run: |
          set -euxo pipefail
          npm install -g @openai/codex@0.1.0
          codex --version || true
          which codex || true

      - name: Create prompt file
        shell: bash
        run: |
          cat > codex-task.txt <<'EOF'
          你是仓库修复代理，负责处理一次单任务修复。

          当前任务:
          - task_id: ${{ github.event.inputs.task_id }}
          - task_title: ${{ github.event.inputs.task_title }}
          - acceptance: ${{ github.event.inputs.acceptance }}

          执行规则:
          - 只做当前任务
          - 不扩展需求
          - 优先最小改动
          - 优先直接修复仓库内现有代码、配置、路径或 workflow
          - 如果问题与 GitHub Actions、CLI 参数、文件不存在、路径错误有关，优先修这些
          - 能改就直接改，不要只停留在分析
          - 修改后自行检查改动是否与 acceptance 一致

          输出要求:
          1. 修改了哪些文件
          2. 每个修改的目的
          3. 当前任务是否已满足 acceptance
          4. 如果还没完全满足，缺什么
          EOF

          echo "===== codex-task.txt ====="
          cat codex-task.txt

      - name: Run Codex CLI
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_DISABLE_WEBSOCKET: "1"
        run: |
          set -euxo pipefail

          echo "===== Try normal codex mode ====="
          if codex "$(cat codex-task.txt)" | tee codex-output.log; then
            exit 0
          fi

          echo "===== Normal mode failed, retry after 5s ====="
          sleep 5

          echo "===== Try exec mode fallback ====="
          if codex exec "$(cat codex-task.txt)" | tee -a codex-output.log; then
            exit 0
          fi

          echo "===== Exec mode failed, final retry after 5s ====="
          sleep 5

          echo "===== Final retry: normal codex mode ====="
          codex "$(cat codex-task.txt)" | tee -a codex-output.log

      - name: Show git diff
        if: always()
        shell: bash
        run: |
          set +e
          echo "===== git status ====="
          git status --short
          echo "===== git diff --stat ====="
          git diff --stat
          echo "===== git diff ====="
          git diff || true
          echo "===== last commit ====="
          git log -1 --oneline || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-cli-logs-${{ github.run_id }}
          path: |
            codex-task.txt
            codex-output.log
          if-no-files-found: warn

      - name: Commit changes
        if: success()
        shell: bash
        run: |
          set -euxo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes made by Codex."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "fix: ${{ github.event.inputs.task_title }}"

      - name: Push changes
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          git push origin HEAD:${GITHUB_REF_NAME}
