name: DeerFlow Codex Task Runner

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task ID"
        required: true
        type: string
      task_title:
        description: "Task title"
        required: true
        type: string
      acceptance:
        description: "Acceptance criteria"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  codex_task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Codex State
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /home/runner/.codex
          echo "{\"run_id\":\"${{ github.run_id }}\",\"status\":\"init\"}" > /home/runner/.codex/${{ github.run_id }}.json
          echo "Bootstrapped:"
          cat /home/runner/.codex/${{ github.run_id }}.json

      - name: Debug codex dir before run
        shell: bash
        run: |
          set -euxo pipefail
          echo "github.run_id=${{ github.run_id }}"
          echo "HOME=$HOME"
          pwd
          ls -la /home/runner || true
          ls -la /home/runner/.codex || true
          find /home/runner/.codex -maxdepth 2 -type f | sort || true

      - name: Run Codex
        id: codex
        uses: openai/codex-action@main
        with:
          prompt: |
            你是仓库修复代理，负责处理一次单任务修复。

            当前任务:
            - task_id: ${{ github.event.inputs.task_id }}
            - task_title: ${{ github.event.inputs.task_title }}
            - acceptance: ${{ github.event.inputs.acceptance }}

            执行规则:
            - 只做当前任务
            - 不扩展需求
            - 优先最小改动
            - 优先直接修复仓库内现有代码、配置、路径或 workflow
            - 如果问题与 GitHub Actions、Codex 参数、文件不存在、路径错误有关，优先修这些
            - 不要只停留在分析，能改就直接改

            输出要求:
            1. 修改了哪些文件
            2. 每个修改的目的
            3. 当前任务是否已满足 acceptance
            4. 如果还没完全满足，缺什么
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug codex dir after run
        if: always()
        shell: bash
        run: |
          set +e
          echo "After Codex:"
          echo "github.run_id=${{ github.run_id }}"
          echo "HOME=$HOME"
          ls -la /home/runner/.codex || true
          find /home/runner/.codex -maxdepth 2 -type f | sort || true
          for f in /home/runner/.codex/*.json; do
            echo "---- $f ----"
            cat "$f" || true
          done

      - name: Upload codex debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-debug-${{ github.run_id }}
          path: |
            /home/runner/.codex
          if-no-files-found: warn